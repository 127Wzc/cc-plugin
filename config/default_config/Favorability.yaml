# 群友好感度配置

# 是否启用好感度功能
enable: true

# 仅在这些群内记录普通消息产生的好感度。
# 留空表示不自动记录任何群，避免所有群消息都触发数据写入。
whitelistGroups: []

# 缓存落盘间隔，单位秒。值越大 IO 越少，但异常退出时可能丢失最近一小段缓存数据。
# 最小会按 10 秒处理。
flushIntervalSeconds: 60

# 是否启用连续发言惩罚。
# 关闭后连续发言不会降低别人对该用户的好感度。
consecutivePenaltyEnabled: false

# 连续发言惩罚概率，单位百分比。
# 连续发言超过 1 条后，如果等待时间内无人打断，会按这个概率让每条“别人 -> 该用户”的好感度 -1。
consecutivePenaltyProbability: 30

# 连续发言惩罚等待时间，单位分钟。
# 连续发言后超过这个时间仍无人打断时，才会触发概率扣减。
consecutivePenaltyDelayMinutes: 10

# 是否启用每日好感度衰减。
# 开启后每天维护任务会让正负好感度都向 0 靠近。
dailyDecayEnabled: false

# 每天衰减的数值。正数会减少，负数会恢复；衰减到 0 后会删除该关系记录。
dailyDecay: 1
