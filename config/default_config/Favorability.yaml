# 群友好感度配置

# 是否启用好感度功能
enable: true

# 仅在这些群内记录普通消息产生的好感度。
# 留空表示不自动记录任何群，避免所有群消息都触发数据写入。
whitelistGroups: []

# 缓存落盘间隔，单位秒。值越大 IO 越少，但异常退出时可能丢失最近一小段缓存数据。
# 最小会按 10 秒处理。
flushIntervalSeconds: 60

# 是否启用每日好感度衰减。
# 开启后每天维护任务会让正负好感度都向 0 靠近。
dailyDecayEnabled: false

# 每天衰减的数值。正数会减少，负数会恢复；衰减到 0 后会删除该关系记录。
dailyDecay: 1
